name: build-binaries

# Repackages upstream-prebuilt libvips into self-contained per-
# platform archives that Vips-Native's Build.rakumod can download
# at install time. We do NOT compile vips ourselves — the upstream
# sources (Homebrew, conda-forge, libvips/build-win64-mxe) are all
# reputable and well-tested, and rebuilding vips's huge dep tree
# from source in CI would be a maintenance nightmare.
#
# Per platform:
#   1. Download libvips + transitive deps from the upstream source.
#   2. Cherry-pick the .dylib/.so/.dll files we need; drop CLI
#      binaries, headers, locales, docs, .a archives.
#   3. Relocate inter-lib refs to @loader_path / $ORIGIN / sibling
#      DLLs so the bundle is self-contained and movable.
#   4. Repackage as vips-<platform>.{tar.gz,zip}.
#   5. Publish to GitHub Releases under the BINARY_TAG.
#
# Trigger: workflow_dispatch (manual) with a libvips version input,
# or pushing a tag matching binaries-vips-*.

on:
  workflow_dispatch:
  push:
    tags:
      - 'binaries-vips-*'

jobs:
  # ---------------------------------------------------------------
  # macOS arm64 — Homebrew bottle
  # ---------------------------------------------------------------
  build-macos:
    name: build-macos-arm64
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version + tag from BINARY_TAG
        id: vars
        shell: bash
        run: |
          set -euxo pipefail
          # head -n1 + tr handles both CRLF (Windows checkout) and
          # any accidental trailing whitespace.
          BINARY_TAG="$(head -n1 BINARY_TAG | tr -d '[:space:]')"
          if [[ -z "$BINARY_TAG" ]]; then
            echo "❌ BINARY_TAG empty / missing."
            ls -la BINARY_TAG || true
            exit 1
          fi
          # If triggered by tag push, sanity-check the pushed tag
          # matches the file. Stops a stale checkout from publishing
          # under the wrong tag.
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            pushed="${GITHUB_REF#refs/tags/}"
            if [[ "$pushed" != "$BINARY_TAG" ]]; then
              echo "❌ Pushed tag '$pushed' doesn't match BINARY_TAG '$BINARY_TAG'."
              exit 1
            fi
          fi
          VIPS_VERSION="$(echo "$BINARY_TAG" | sed -E 's/^binaries-vips-(.+)-r[0-9]+$/\1/')"
          # Fail loud if the parse produced empty — better than letting
          # a downstream step try to download `vips-dev-w64-all-.zip`.
          if [[ -z "$VIPS_VERSION" || "$VIPS_VERSION" == "$BINARY_TAG" ]]; then
            echo "❌ Could not parse vips version from BINARY_TAG='$BINARY_TAG'."
            echo "   Expected format: binaries-vips-<version>-r<N>"
            exit 1
          fi
          echo "vips_version=$VIPS_VERSION" >> "$GITHUB_OUTPUT"
          echo "binary_tag=$BINARY_TAG"     >> "$GITHUB_OUTPUT"

      - name: Install vips via Homebrew
        run: |
          set -euxo pipefail
          # Homebrew bottles are version-pinned per formula. We can
          # `brew install vips@${VIPS_VERSION}` only if a versioned
          # formula exists; otherwise install latest and assert the
          # version matches what we requested.
          brew update
          brew install vips dylibbundler
          INSTALLED=$(brew list --versions vips | awk '{print $2}')
          REQUESTED='${{ steps.vars.outputs.vips_version }}'
          # Homebrew versions sometimes carry a _N revision suffix
          # (e.g. 8.18.2_1). Compare on the leading MAJOR.MINOR.PATCH
          # only so a homebrew rebump doesn't break us.
          INSTALLED_MMP=$(echo "$INSTALLED" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')
          if [[ "$INSTALLED_MMP" != "$REQUESTED" ]]; then
            echo "❌ Homebrew installed vips $INSTALLED ($INSTALLED_MMP) but workflow"
            echo "   requested $REQUESTED. Bump BINARY_TAG to match Homebrew's"
            echo "   current version, or pin via an explicit formula URL."
            exit 1
          fi

      - name: Stage + bundle
        run: |
          set -euxo pipefail
          BREW_PREFIX=$(brew --prefix)
          VIPS_CELLAR=$(brew --prefix vips)
          mkdir -p bundle

          # Stage the entry-point lib(s) — dylibbundler will pull in
          # transitive deps automatically. Use -of (overwrite files,
          # not -od which wipes the dest dir).
          cp "$VIPS_CELLAR/lib/libvips.42.dylib" bundle/

          # `-s` paths tell dylibbundler where to look for sibling
          # libs by their @rpath / unqualified install_name refs.
          # Adding both the brew prefix lib dir and each tapped
          # cellar's lib dir covers the usual layout.
          dylibbundler \
              -of \
              -b \
              -x bundle/libvips.42.dylib \
              -d bundle \
              -p '@loader_path/' \
              -s "$BREW_PREFIX/lib" \
              -s "$BREW_PREFIX/opt/glib/lib" \
              -s "$BREW_PREFIX/opt/gettext/lib" \
              -s "$BREW_PREFIX/opt/libffi/lib"

          # dylibbundler rewrites dependency refs on its -x input
          # but leaves the input's own LC_ID_DYLIB (install_name)
          # alone. That means our bundled libvips.42.dylib still
          # advertises itself as
          # `/opt/homebrew/opt/vips/lib/libvips.42.dylib`, which
          # causes dyld to treat it as if loaded from that path and
          # can trigger a second libvips being loaded from the
          # Homebrew location later. Rewrite the id to a self-
          # referential @loader_path form so dyld identifies the
          # bundled copy as authoritative.
          install_name_tool -id '@loader_path/libvips.42.dylib' \
              bundle/libvips.42.dylib

          # vips 8.15+ splits format loaders (pngload, jpegload,
          # heifload, webpsave, …) into separately-dlopen'd modules
          # under $VIPS_CELLAR/lib/vips-modules-<abi>/. dylibbundler
          # only follows link-time deps, so without an explicit copy
          # the bundle ships with a libvips that can't open any
          # image formats — vips_image_new_from_file() silently
          # returns NULL. Stage the modules alongside libvips and
          # rebundle their own inter-lib refs so they find the
          # bundled libvips via @loader_path/../.
          MODULES_SRC=$(find "$VIPS_CELLAR/lib" -maxdepth 1 -type d \
              -name 'vips-modules-*' | head -n1)
          if [[ -z "$MODULES_SRC" ]]; then
              # Static-loader vips would render this a no-op; we
              # haven't seen Homebrew ship that variant, so treat
              # the missing dir as a Homebrew-layout regression
              # worth halting the build over rather than silently
              # producing a broken bundle.
              echo "❌ No vips-modules-* dir found under $VIPS_CELLAR/lib."
              echo "   Homebrew-provided libvips is expected to split format"
              echo "   loaders into modules from 8.15+. Bundle would be"
              echo "   unable to open any image format — failing hard."
              ls -la "$VIPS_CELLAR/lib"
              exit 1
          fi
          # Preserve Homebrew's dir name verbatim — libvips computes
          # the module search path as $VIPSHOME/lib/vips-modules-<M>.<m>/
          # at runtime (FFI.rakumod sets VIPSHOME to the staged parent),
          # so the bundle's dir name has to match exactly or libvips
          # finds nothing. Renaming to a plain "vips-modules" here
          # would break the prefix lookup.
          MODULES_BASENAME=$(basename "$MODULES_SRC")
          MODULES_DEST="bundle/$MODULES_BASENAME"
          mkdir -p "$MODULES_DEST"
          # Show what's actually in there before copying — helps
          # diagnose future layout changes (e.g. Homebrew switching
          # to static loaders would leave this dir empty, which we
          # want to fail loudly on, not silently).
          echo "--- $MODULES_SRC contents ---"
          ls -la "$MODULES_SRC"
          module_count=$(find "$MODULES_SRC" -maxdepth 1 -type f | wc -l)
          if (( module_count == 0 )); then
              echo "❌ $MODULES_SRC is empty — Homebrew vips may have"
              echo "   switched to static loaders. Bundle cannot proceed;"
              echo "   investigate before publishing."
              exit 1
          fi
          cp "$MODULES_SRC"/* "$MODULES_DEST"/

          # Recursively bundle the vips-modules' full transitive
          # dep closure.
          #
          # dylibbundler only follows *link-time* deps of its -x
          # target. The vips-modules (vips-heif, vips-jxl, vips-
          # magick, vips-openslide, vips-poppler) are dlopen'd by
          # libvips at init time, so dylibbundler never sees them
          # nor their transitive deps (libheif, libjxl,
          # libMagickCore, libopenslide, libpoppler + everything
          # those pull — libgio via libpoppler-glib etc.). If those
          # deps are left referencing Homebrew absolute paths, dyld
          # loads Homebrew's copies at runtime, which on macOS
          # causes duplicate libgio / libglib / libgobject loads →
          # duplicate GObject type registration, duplicate
          # Objective-C class registration (GNotificationCenter-
          # Delegate etc.) → test failures on runners where our
          # bundled glib happens to match Homebrew's version.
          #
          # The recursive bundler below walks each module's
          # deps via otool -L, copies missing deps into bundle/ at
          # top level, rewrites their install_name to @loader_path/
          # so siblings find each other, and recurses into the new
          # dep's own deps. Module refs themselves get rewritten
          # to @loader_path/../ since modules live one dir deeper.
          # The end state: bundle/ contains the full closure,
          # zero absolute /opt/homebrew paths in any Mach-O file,
          # no surprise loads at runtime.
          bundle_deps() {
              local target="$1"
              local prefix="$2"  # @loader_path/ or @loader_path/../
              chmod +w "$target"
              # First line of `otool -L` on a dylib is the target's
              # own LC_ID_DYLIB — skip with tail -n +2. Remaining
              # lines are its LC_LOAD_DYLIBs.
              otool -L "$target" | tail -n +2 | awk '{print $1}' \
                  | while read -r dep; do
                  [[ -z "$dep" ]] && continue
                  # System libs stay dynamic — always present on every
                  # macOS install, different per OS version by design.
                  case "$dep" in
                      /usr/lib/*|/System/*) continue ;;
                      # Already @loader_path-relative — nothing to do.
                      '@loader_path'/*) continue ;;
                  esac
                  local base="${dep##*/}"
                  # Resolve the source to copy from. For @rpath refs
                  # we don't have rpath info here; best-effort search
                  # under Homebrew by basename. Most Homebrew formulae
                  # use absolute LC_LOAD_DYLIB paths so this is rare.
                  local actual=""
                  case "$dep" in
                      '@rpath'/*|'@executable_path'/*)
                          # No reliable way to know which LC_RPATH
                          # the caller had without parsing otool -l
                          # again; best-effort search under Homebrew
                          # by basename. Fail hard if not found —
                          # leaving an unresolvable @rpath in a
                          # bundled binary means silent runtime
                          # failures in dlopen, which is exactly the
                          # class of bug this bundler exists to
                          # prevent.
                          # -L tells find to follow symlinks so it can
                          # resolve Homebrew's /opt/homebrew/opt/<formula>
                          # → /opt/homebrew/Cellar/<formula>/<ver> link
                          # scheme. Without -L, `-type f` rejects the
                          # symlink and misses the real file behind it.
                          actual=$(find -L "$BREW_PREFIX" -maxdepth 6 \
                              -name "$base" -type f 2>/dev/null \
                              | head -n1)
                          if [[ -z "$actual" ]]; then
                              echo "❌ cannot resolve $dep ($base)" \
                                   "under $BREW_PREFIX"
                              echo "   target: $target"
                              echo "   this would leave an unresolvable"
                              echo "   @rpath/@executable_path ref in a"
                              echo "   bundled binary — fix the bundler"
                              echo "   or add an explicit ignore."
                              exit 1
                          fi
                          ;;
                      /*)
                          actual="$dep"
                          # Follow symlinks (e.g. libjpeg.8.dylib ->
                          # libjpeg.8.3.2.dylib). Copy the real file
                          # but keep the ref-site basename.
                          while [[ -L "$actual" ]]; do
                              local link
                              link=$(readlink "$actual")
                              case "$link" in
                                  /*) actual="$link" ;;
                                  *)  actual="$(dirname "$actual")/$link" ;;
                              esac
                          done
                          ;;
                      *)
                          echo "WARN: unrecognised dep format '$dep' — skipping"
                          continue
                          ;;
                  esac
                  [[ -f "$actual" ]] || {
                      echo "❌ resolved path $actual does not exist"
                      echo "   target: $target, dep: $dep"
                      echo "   otool reported this dep but it's not on disk —"
                      echo "   broken symlink? Halting before shipping a bundle"
                      echo "   with stale refs."
                      exit 1
                  }
                  # Add to bundle/ if new.
                  if [[ ! -f "bundle/$base" ]]; then
                      cp "$actual" "bundle/$base"
                      chmod +w "bundle/$base"
                      install_name_tool -id "@loader_path/$base" "bundle/$base"
                      # Recurse — the dep lives at top level now, so
                      # its own refs to siblings use @loader_path/.
                      bundle_deps "bundle/$base" "@loader_path/"
                  fi
                  # Rewrite this target's ref to the bundled copy.
                  install_name_tool -change "$dep" "${prefix}${base}" "$target"
              done
              # Strip stale LC_RPATH entries; everything's @loader_path
              # now so rpath search is redundant and would just slow
              # dyld probing.
              otool -l "$target" \
                  | awk '/LC_RPATH/{flag=1; next} flag && /path /{print $2; flag=0}' \
                  | while read -r rp; do
                  install_name_tool -delete_rpath "$rp" "$target" 2>/dev/null || true
              done
          }

          shopt -s nullglob
          for mod in "$MODULES_DEST"/*; do
              [[ -L "$mod" ]] && continue
              [[ -f "$mod" ]] || continue
              file "$mod" | grep -q 'Mach-O' || continue
              bundle_deps "$mod" "@loader_path/../"
          done

          # Sanity audit: every Mach-O dep should be either @loader_path-
          # relative (our bundled siblings) or /usr/lib/ or /System/
          # (system libs we deliberately keep dynamic). Anything else
          # is a bundler miss — a Homebrew absolute path (dyld will
          # load the system copy) or a surviving @rpath/@executable_path
          # with no rpath to resolve against (silent dlopen failure at
          # runtime). Fail loud rather than ship a broken archive.
          echo "--- audit: scanning for non-self-contained refs ---"
          stray=0
          while read -r f; do
              file "$f" 2>/dev/null | grep -q 'Mach-O' || continue
              # Skip the first otool line (target's own LC_ID_DYLIB —
              # irrelevant to load-time resolution of deps).
              bad=$(otool -L "$f" 2>/dev/null | tail -n +2 | awk '{print $1}' \
                      | grep -vE '^@loader_path/|^/usr/lib/|^/System/' || true)
              if [[ -n "$bad" ]]; then
                  echo "❌ $f has non-self-contained refs:"
                  echo "$bad" | sed 's/^/     /'
                  stray=$((stray + 1))
              fi
          done < <(find bundle -type f ! -type l)
          if (( stray > 0 )); then
              echo "❌ $stray file(s) leaked non-self-contained refs."
              echo "   Bundle would load libs from outside bundle/ at runtime,"
              echo "   which is the class of bug this bundler exists to prevent."
              exit 1
          fi
          echo "✅ every Mach-O dep resolves within bundle/ or to /usr/lib/-/System/."

          # Codesign — dylibbundler's install_name_tool calls
          # invalidate the linker-emitted ad-hoc signature. macOS
          # Sequoia kernel SIGKILLs on tainted page access without
          # a valid sig. Same fix as Notcurses-Native.
          find bundle -name '*.dylib' -type f ! -type l \
            -exec codesign --force --sign - --timestamp=none {} \;
          # Format-loader modules are typically .so on macOS (glib's
          # GIOModule convention) but suffix varies — codesign every
          # regular Mach-O file under the modules dir regardless of
          # extension.
          find "$MODULES_DEST" -type f ! -type l | while read -r mod; do
              file "$mod" | grep -q 'Mach-O' || continue
              codesign --force --sign - --timestamp=none "$mod"
          done
          for f in bundle/*.dylib; do
            [[ -L "$f" ]] && continue
            codesign --verify "$f" || { echo "❌ $f failed verify"; exit 1; }
          done
          find "$MODULES_DEST" -type f ! -type l | while read -r mod; do
              file "$mod" | grep -q 'Mach-O' || continue
              codesign --verify "$mod" \
                  || { echo "❌ $mod failed verify"; exit 1; }
          done

          # Symlinks for the unversioned name so resolution works
          # whether the caller asks for `libvips.dylib` or the
          # versioned `libvips.42.dylib`.
          ln -sf libvips.42.dylib bundle/libvips.dylib

          echo "--- bundle contents ---"
          ls -la bundle/

      - name: Package archive
        id: package
        run: |
          set -euxo pipefail
          artifact="vips-macos-arm64.tar.gz"
          tar -czf "$artifact" -C bundle .
          # macOS ships shasum (BSD) not sha256sum (GNU coreutils).
          shasum -a 256 "$artifact" | tee "${artifact}.sha256"
          mkdir -p artefacts
          mv "$artifact" "${artifact}.sha256" artefacts/

      - uses: actions/upload-artifact@v4
        with:
          name: vips-macos-arm64
          path: artefacts/
          retention-days: 14

  # ---------------------------------------------------------------
  # Linux — conda-forge libvips package, x86_64 + aarch64
  # ---------------------------------------------------------------
  build-linux:
    name: build-${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux-x86_64-glibc
            conda-subdir: linux-64
          - os: ubuntu-22.04-arm
            platform: linux-aarch64-glibc
            conda-subdir: linux-aarch64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version + tag from BINARY_TAG
        id: vars
        shell: bash
        run: |
          set -euxo pipefail
          BINARY_TAG="$(head -n1 BINARY_TAG | tr -d '[:space:]')"
          if [[ -z "$BINARY_TAG" ]]; then
            echo "❌ BINARY_TAG empty / missing."
            ls -la BINARY_TAG || true
            exit 1
          fi
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            pushed="${GITHUB_REF#refs/tags/}"
            if [[ "$pushed" != "$BINARY_TAG" ]]; then
              echo "❌ Pushed tag '$pushed' doesn't match BINARY_TAG '$BINARY_TAG'."
              exit 1
            fi
          fi
          VIPS_VERSION="$(echo "$BINARY_TAG" | sed -E 's/^binaries-vips-(.+)-r[0-9]+$/\1/')"
          if [[ -z "$VIPS_VERSION" || "$VIPS_VERSION" == "$BINARY_TAG" ]]; then
            echo "❌ Could not parse vips version from BINARY_TAG='$BINARY_TAG'."
            echo "   Expected format: binaries-vips-<version>-r<N>"
            exit 1
          fi
          echo "vips_version=$VIPS_VERSION" >> "$GITHUB_OUTPUT"
          echo "binary_tag=$BINARY_TAG"     >> "$GITHUB_OUTPUT"

      - uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: false
          channels: conda-forge
          channel-priority: strict

      - name: Install patchelf
        run: sudo apt-get install -y --no-install-recommends patchelf

      - name: Fetch libvips from conda-forge
        shell: bash -el {0}
        run: |
          set -euxo pipefail
          conda create -y -n vipsenv -c conda-forge \
              "libvips=${{ steps.vars.outputs.vips_version }}"
          # conda env's lib dir is where libvips + glib + the
          # format libs all live, with their real filenames.
          ENV_LIB="$CONDA/envs/vipsenv/lib"
          echo "ENV_LIB=$ENV_LIB" >> "$GITHUB_ENV"

      - name: Stage + bundle
        shell: bash -el {0}
        run: |
          set -euxo pipefail
          mkdir -p bundle

          # Start from libvips.so.42 and walk transitive deps via ldd.
          # Skip system libs (anything under /usr or /lib) — those are
          # base glibc / libstdc++ that any user system has.
          cp "$ENV_LIB"/libvips.so.42* bundle/ || true
          cp -d "$ENV_LIB"/libvips.so* bundle/ 2>/dev/null || true

          declare -A SEEN
          process_deps() {
            local lib="$1"
            local depth="${2:-0}"
            (( depth > 12 )) && return 0
            local key="$(basename "$lib")"
            [[ -n "${SEEN[$key]:-}" ]] && return 0
            SEEN[$key]=1
            # LD_LIBRARY_PATH so ldd resolves transitive deps via the
            # conda env first, not whatever the runner happens to
            # have system-installed. Without this, glib/gobject etc
            # come from /lib/aarch64-linux-gnu and get skipped as
            # "system libs" — bundle ships missing its core deps.
            LD_LIBRARY_PATH="$ENV_LIB:${LD_LIBRARY_PATH:-}" \
              ldd "$lib" 2>/dev/null \
              | sed -nE 's/^[[:space:]]*([^ ]+) => ([^ ]+) .*/\1\t\2/p' \
              | while IFS=$'\t' read -r name path; do
                  [[ -z "$path" ]] && continue
                  # `=> not found` parses as path="not" — skip cleanly.
                  # Anything starting with `not` (followed by whitespace
                  # in the original ldd output) is one of these.
                  [[ "$path" == "not" ]] && {
                    echo "WARN: $name unresolved by ldd ('not found') — skipping"
                    continue
                  }
                  # Path must be absolute + a real file.
                  [[ "$path" != /* || ! -f "$path" ]] && continue
                  # Skip system libs — these stay dynamic.
                  case "$path" in
                    /lib/*|/lib64/*|/usr/lib/*|/usr/lib64/*) continue ;;
                  esac
                  # Skip the linker itself.
                  case "$name" in
                    ld-linux*|linux-vdso*|libc.so*|libm.so*|libpthread.so*|libdl.so*|librt.so*|libstdc++.so*|libgcc_s.so*) continue ;;
                  esac
                  if [[ ! -f "bundle/$name" ]]; then
                    cp "$path" "bundle/$name"
                    echo "Bundled: $name (from $path)"
                    process_deps "bundle/$name" $((depth + 1))
                  fi
                done
          }

          for lib in bundle/libvips.so*; do
            [[ -L "$lib" ]] && continue
            process_deps "$lib"
          done

          # Set $ORIGIN rpath on every bundled .so so they find each
          # other by sibling lookup at runtime, regardless of where
          # the user installs the bundle dir on disk.
          for so in bundle/*.so*; do
            [[ -L "$so" ]] && continue
            patchelf --set-rpath '$ORIGIN' "$so" || true
          done

          # Convenience symlink for the unversioned name.
          ln -sf libvips.so.42 bundle/libvips.so

          echo "--- bundle contents ---"
          ls -la bundle/

      - name: Package archive
        run: |
          set -euxo pipefail
          artifact="vips-${{ matrix.platform }}.tar.gz"
          tar -czf "$artifact" -C bundle .
          sha256sum "$artifact" | tee "${artifact}.sha256"
          mkdir -p artefacts
          mv "$artifact" "${artifact}.sha256" artefacts/

      - uses: actions/upload-artifact@v4
        with:
          name: vips-${{ matrix.platform }}
          path: artefacts/
          retention-days: 14

  # ---------------------------------------------------------------
  # Windows x86_64 + arm64 — libvips/build-win64-mxe official prebuilt
  # ---------------------------------------------------------------
  build-windows:
    name: build-${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x86_64
            mxe-arch: x64
          - platform: windows-arm64
            mxe-arch: arm64
    runs-on: windows-2022
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version + tag from BINARY_TAG
        id: vars
        shell: bash
        run: |
          set -euxo pipefail
          BINARY_TAG="$(head -n1 BINARY_TAG | tr -d '[:space:]')"
          if [[ -z "$BINARY_TAG" ]]; then
            echo "❌ BINARY_TAG empty / missing."
            ls -la BINARY_TAG || true
            exit 1
          fi
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            pushed="${GITHUB_REF#refs/tags/}"
            if [[ "$pushed" != "$BINARY_TAG" ]]; then
              echo "❌ Pushed tag '$pushed' doesn't match BINARY_TAG '$BINARY_TAG'."
              exit 1
            fi
          fi
          VIPS_VERSION="$(echo "$BINARY_TAG" | sed -E 's/^binaries-vips-(.+)-r[0-9]+$/\1/')"
          if [[ -z "$VIPS_VERSION" || "$VIPS_VERSION" == "$BINARY_TAG" ]]; then
            echo "❌ Could not parse vips version from BINARY_TAG='$BINARY_TAG'."
            echo "   Expected format: binaries-vips-<version>-r<N>"
            exit 1
          fi
          echo "vips_version=$VIPS_VERSION" >> "$GITHUB_OUTPUT"
          echo "binary_tag=$BINARY_TAG"     >> "$GITHUB_OUTPUT"

      - name: Fetch + extract build-win64-mxe prebuilt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          # build-win64-mxe asset naming:
          #   vips-dev-x64-all-<version>.zip      (Windows x86_64, all formats)
          #   vips-dev-arm64-all-<version>.zip    (Windows arm64,  all formats)
          # The "-all" variant carries heif/avif/openslide/etc; the
          # "-web" variants are stripped down. Tag scheme is v<version>.
          ZIP="vips-dev-${{ matrix.mxe-arch }}-all-${{ steps.vars.outputs.vips_version }}.zip"
          gh release download "v${{ steps.vars.outputs.vips_version }}" \
              --repo libvips/build-win64-mxe \
              --pattern "$ZIP" \
              --output "$ZIP"
          unzip -q "$ZIP"
          extract_dir=$(ls -d vips-dev-* | head -1)
          echo "EXTRACT_DIR=$extract_dir" >> "$GITHUB_ENV"

      - name: Stage DLLs
        run: |
          set -euxo pipefail
          mkdir -p bundle
          # Sibling-DLL search at runtime (enabled by FFI.rakumod
          # prepending the staged lib dir to PATH before LoadLibrary)
          # means we just copy every top-level DLL the upstream zip
          # ships — they're all designed to live in the same dir.
          # Skip the .exe / headers / pkgconfig.
          cp "$EXTRACT_DIR"/bin/*.dll bundle/

          # vips 8.15+ splits format loaders (pngload, jpegload,
          # heifload, webpsave, …) into separately-dlopen'd modules.
          # build-win64-mxe ships these under bin/vips-modules/; they
          # don't match the top-level *.dll glob above, so without
          # an explicit copy the bundle ships with a libvips that
          # can't open any image format. FFI.rakumod sets
          # VIPS_MODULEDIR to <staged-lib>/vips-modules at load time
          # so libvips finds them here.
          # Subdir name is versioned (e.g. vips-modules-8.18) — glob
          # it and let find pick the first match. Preserve that exact
          # name on copy so libvips's runtime module path
          # ($VIPSHOME/lib/vips-modules-<M>.<m>/, set by FFI.rakumod)
          # finds our staged copy.
          WIN_MODULES_SRC=$(find "$EXTRACT_DIR/bin" -maxdepth 1 -type d \
              -name 'vips-modules-*' | head -n1)
          if [[ -n "$WIN_MODULES_SRC" ]]; then
              WIN_MODULES_BASENAME=$(basename "$WIN_MODULES_SRC")
              mkdir -p "bundle/$WIN_MODULES_BASENAME"
              cp "$WIN_MODULES_SRC"/*.dll "bundle/$WIN_MODULES_BASENAME"/
          else
              # Static-loader vips would make this a no-op, but
              # build-win64-mxe has used split modules since 8.15+;
              # a missing dir here means upstream has restructured
              # the zip. Halt rather than publishing an archive that
              # silently can't open any image format.
              echo "❌ No vips-modules-* subdir in build-win64-mxe zip."
              echo "   Upstream layout change? Inspect:"
              ls -la "$EXTRACT_DIR/bin"
              exit 1
          fi

          echo "--- bundle/ (top-level) ---"
          ls -la bundle/
          echo "(total top-level: $(find bundle -maxdepth 1 -type f | wc -l) files)"
          echo "--- bundle/$WIN_MODULES_BASENAME/ ---"
          ls -la "bundle/$WIN_MODULES_BASENAME/"
          echo "(total modules: $(find "bundle/$WIN_MODULES_BASENAME" -type f | wc -l) files)"
          # Explicit sanity check — the sibling-DLL path fix is useless
          # if the entry-point DLL itself isn't in the bundle.
          if [[ ! -f bundle/libvips-42.dll ]]; then
              echo "❌ libvips-42.dll not staged — top-level copy regression."
              exit 1
          fi

      - name: Package archive
        run: |
          set -euxo pipefail
          artifact="vips-${{ matrix.platform }}.zip"
          (cd bundle && 7z a "../$artifact" .)
          sha256sum "$artifact" | tee "${artifact}.sha256"
          mkdir -p artefacts
          mv "$artifact" "${artifact}.sha256" artefacts/

      - uses: actions/upload-artifact@v4
        with:
          name: vips-${{ matrix.platform }}
          path: artefacts/
          retention-days: 14

  # ---------------------------------------------------------------
  # Aggregate + publish release
  # ---------------------------------------------------------------
  publish:
    name: publish
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag from BINARY_TAG
        id: vars
        run: |
          set -euxo pipefail
          BINARY_TAG="$(tr -d '[:space:]' < BINARY_TAG)"
          [[ -z "$BINARY_TAG" ]] && { echo "❌ BINARY_TAG empty"; exit 1; }
          echo "binary_tag=$BINARY_TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Aggregate + checksum
        run: |
          set -euxo pipefail
          mkdir -p release
          find dist -type f \( -name '*.tar.gz' -o -name '*.zip' \) \
              -exec cp {} release/ \;
          (cd release && sha256sum *.tar.gz *.zip 2>/dev/null) > release/checksums.txt
          ls -la release/
          cat release/checksums.txt

      - name: Create / update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          tag="${{ steps.vars.outputs.binary_tag }}"
          # Idempotent: edit if exists, else create.
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" release/* --clobber
          else
            gh release create "$tag" release/* \
                --title "$tag" \
                --notes "Repackaged libvips prebuilts. See resources/checksums.txt in Vips-Native for the verified hashes."
          fi
