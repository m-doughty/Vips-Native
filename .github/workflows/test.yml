name: test

on:
  push:
    branches:
      - '*'
    tags-ignore:
      - '*'
  pull_request:

jobs:
  raku:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            install-system-libvips: |
              sudo apt update
              sudo apt install -y libvips-dev
          - os: macos-latest
            install-system-libvips: |
              brew install vips
          - os: windows-latest
            # No system-libvips install on Windows: vcpkg / chocolatey
            # paths are flaky in CI and the prebuilt is the path 99%
            # of users will take. We only run the prebuilt pass here.
            install-system-libvips: ''
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: Raku/setup-raku@v1
        with:
          raku-version: 'latest'

      - name: Install system libvips
        if: matrix.install-system-libvips != ''
        shell: bash
        run: ${{ matrix.install-system-libvips }}

      # ---------------------------------------------------------
      # Prebuilt path: zef install runs Build.rakumod which
      # downloads the prebuilt, SHA-verifies, stages to the XDG
      # data dir under real filenames. Native.rakumod's resolver
      # finds the staged libs via the XDG-staged-dir branch.
      # ---------------------------------------------------------
      - name: Install Vips::Native via prebuilt path
        run: zef install --/test .

      - name: Install App::Prove6
        run: zef install --/test App::Prove6

      - name: Run unit tests — prebuilt path
        shell: bash
        env:
          # Makes libvips and GLib chatty on stderr. Test output is
          # mostly TAP on stdout, so the extra log lines don't break
          # the plan parser. If a load fails, we get the real error
          # instead of a silent NULL return.
          VIPS_WARNING: '1'
          VIPS_INFO: '1'
          G_MESSAGES_DEBUG: 'all'
        run: prove6 --verbose -I lib t

      # Diagnostic — only runs if prove6 just failed. Dumps the
      # full FFI/runtime picture so the next push doesn't need to
      # re-guess. Kept out of the success path to avoid noise.
      - name: Diagnose macOS prebuilt failures
        if: failure() && runner.os == 'macOS'
        shell: bash
        run: |
          set -x
          echo "=== resolved lib paths ==="
          raku -Ilib -e '
            use Vips::Native::FFI;
            say "vips-lib:       $vips-lib";
            say "gobject-lib:    $gobject-lib";
            say "VIPS_MODULEDIR: ", %*ENV<VIPS_MODULEDIR> // "(unset)";
            say "GIO_MODULE_DIR: ", %*ENV<GIO_MODULE_DIR> // "(unset)";
          '
          echo "=== staged dir ==="
          ls -la "$HOME/.local/share/Vips-Native/"*/lib 2>&1 | head -80
          echo "=== codesign libvips.42.dylib ==="
          codesign -dvvv "$HOME"/.local/share/Vips-Native/*/lib/libvips.42.dylib 2>&1 || true
          echo "=== otool libvips.42.dylib ==="
          otool -L "$HOME"/.local/share/Vips-Native/*/lib/libvips.42.dylib 2>&1 | head -40
          echo "=== vips_error_buffer after failed PNG load ==="
          raku -Ilib -e '
            use Vips::Native::FFI;
            use NativeCall;
            sub vips_error_buffer(--> Str) is native($vips-lib) { * };
            sub vips_error_clear()        is native($vips-lib) { * };
            vips_error_clear();
            my $rc = vips_init("diag");
            say "vips_init = $rc";
            say "post-init error: ", vips_error_buffer() // "(null)";
            my $img = vips_image_new_from_file("t/fixtures/camelia.png", Str);
            say "image defined: ", $img.defined;
            say "vips error: ", vips_error_buffer() // "(null)";
          ' 2>&1 || true

      # ---------------------------------------------------------
      # System-libvips fallback path. Two things matter for this
      # to *actually* exercise the system-loader branch and not
      # just hit the XDG dir from the previous pass:
      #
      #   1. Build.rakumod must skip the download
      #      (VIPS_NATIVE_PREFER_SYSTEM=1).
      #   2. The runtime resolver must NOT find any staged libs
      #      — point VIPS_NATIVE_DATA_DIR at an empty scratch
      #      dir so the staged lookup misses and we genuinely
      #      fall through to the bare 'vips' / 'gobject-2.0'
      #      short names that NativeCall hands to the OS loader.
      #
      # Skipped on Windows where we don't have a system libvips
      # to fall back to (matrix entry has empty
      # install-system-libvips).
      # ---------------------------------------------------------
      - name: Install Vips::Native via system-libvips path
        if: matrix.install-system-libvips != ''
        env:
          VIPS_NATIVE_PREFER_SYSTEM: '1'
        run: zef install --/test --force-install .

      - name: Run unit tests — system-libvips path
        if: matrix.install-system-libvips != ''
        shell: bash
        run: |
          mkdir -p /tmp/vips-native-empty
          VIPS_NATIVE_DATA_DIR=/tmp/vips-native-empty \
            prove6 --verbose -I lib t
