name: test

on:
  push:
    branches:
      - '*'
    tags-ignore:
      - '*'
  pull_request:

jobs:
  raku:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            install-system-libvips: |
              sudo apt update
              sudo apt install -y libvips-dev
          - os: macos-latest
            install-system-libvips: |
              brew install vips
          - os: windows-latest
            # No system-libvips install on Windows: vcpkg / chocolatey
            # paths are flaky in CI and the prebuilt is the path 99%
            # of users will take. We only run the prebuilt pass here.
            install-system-libvips: ''
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: Raku/setup-raku@v1
        with:
          raku-version: 'latest'

      - name: Install system libvips
        if: matrix.install-system-libvips != ''
        shell: bash
        run: ${{ matrix.install-system-libvips }}

      # ---------------------------------------------------------
      # Prebuilt path: zef install runs Build.rakumod which
      # downloads the prebuilt, SHA-verifies, stages to the XDG
      # data dir under real filenames. Native.rakumod's resolver
      # finds the staged libs via the XDG-staged-dir branch.
      # ---------------------------------------------------------
      - name: Install Vips::Native via prebuilt path
        run: zef install --/test .

      - name: Install App::Prove6
        run: zef install --/test App::Prove6

      - name: Run unit tests — prebuilt path
        shell: bash
        run: prove6 --verbose -I lib t

      # ---------------------------------------------------------
      # System-libvips fallback path. Two things matter for this
      # to *actually* exercise the system-loader branch and not
      # just hit the XDG dir from the previous pass:
      #
      #   1. Build.rakumod must skip the download
      #      (VIPS_NATIVE_PREFER_SYSTEM=1).
      #   2. The runtime resolver must NOT find any staged libs
      #      — point VIPS_NATIVE_DATA_DIR at an empty scratch
      #      dir so the staged lookup misses and we genuinely
      #      fall through to the bare 'vips' / 'gobject-2.0'
      #      short names that NativeCall hands to the OS loader.
      #
      # Skipped on Windows where we don't have a system libvips
      # to fall back to (matrix entry has empty
      # install-system-libvips).
      # ---------------------------------------------------------
      - name: Install Vips::Native via system-libvips path
        if: matrix.install-system-libvips != ''
        env:
          VIPS_NATIVE_PREFER_SYSTEM: '1'
        run: zef install --/test --force-install .

      - name: Run unit tests — system-libvips path
        if: matrix.install-system-libvips != ''
        shell: bash
        run: |
          mkdir -p /tmp/vips-native-empty
          VIPS_NATIVE_DATA_DIR=/tmp/vips-native-empty \
            prove6 --verbose -I lib t
